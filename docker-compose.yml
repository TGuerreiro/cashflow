services:

  # ==========================================
  # Infrastructure
  # ==========================================

  postgres-lancamentos:
    image: postgres:16-alpine
    container_name: cashflow-postgres-lancamentos
    environment:
      POSTGRES_DB: cashflow_lancamentos
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow123
    ports:
      - "5432:5432"
    volumes:
      - pgdata-lancamentos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow -d cashflow_lancamentos"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cashflow-net

  postgres-consolidado:
    image: postgres:16-alpine
    container_name: cashflow-postgres-consolidado
    environment:
      POSTGRES_DB: cashflow_consolidado
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow123
    ports:
      - "5433:5432"
    volumes:
      - pgdata-consolidado:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow -d cashflow_consolidado"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cashflow-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cashflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - cashflow-net

  # ==========================================
  # Application Services
  # ==========================================

  lancamentos-api:
    build:
      context: .
      dockerfile: src/CashFlow.Lancamentos/CashFlow.Lancamentos.API/Dockerfile
    container_name: cashflow-lancamentos-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__LancamentosDb: "Host=postgres-lancamentos;Port=5432;Database=cashflow_lancamentos;Username=cashflow;Password=cashflow123"
      ConnectionStrings__RabbitMq: "rabbitmq://rabbitmq"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    ports:
      - "5001:8080"
    depends_on:
      postgres-lancamentos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cashflow-net

  consolidado-api:
    build:
      context: .
      dockerfile: src/CashFlow.Consolidado/CashFlow.Consolidado.API/Dockerfile
    container_name: cashflow-consolidado-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ConsolidadoDb: "Host=postgres-consolidado;Port=5432;Database=cashflow_consolidado;Username=cashflow;Password=cashflow123"
      ConnectionStrings__RabbitMq: "rabbitmq://rabbitmq"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    ports:
      - "5002:8080"
    depends_on:
      postgres-consolidado:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cashflow-net

volumes:
  pgdata-lancamentos:
  pgdata-consolidado:
  rabbitmq-data:

networks:
  cashflow-net:
    driver: bridge
